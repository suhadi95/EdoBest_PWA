---
deployment:
  tasks:
    - export DEPLOYPATH=/home/suhadipc/public_html/web_edobest2/
    - /bin/mkdir -p $DEPLOYPATH
    - /usr/bin/rsync -av --delete --exclude='.git' --exclude='.env' --exclude='node_modules' --exclude='storage/logs/*' --exclude='storage/framework/cache/*' --exclude='storage/framework/sessions/*' --exclude='storage/framework/views/*' ./ $DEPLOYPATH
    - /bin/cp -n $DEPLOYPATH/.env.example $DEPLOYPATH/.env || true
    - cd $DEPLOYPATH && /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction
    - cd $DEPLOYPATH && /usr/local/bin/php artisan migrate --force
    - cd $DEPLOYPATH && /usr/local/bin/php artisan storage:link || true
    - cd $DEPLOYPATH && /usr/local/bin/php artisan config:cache
    - cd $DEPLOYPATH && /usr/local/bin/php artisan route:cache
    - cd $DEPLOYPATH && /usr/local/bin/php artisan view:cache
    - /bin/chmod -R ug+rwx $DEPLOYPATH/storage $DEPLOYPATH/bootstrap/cache
