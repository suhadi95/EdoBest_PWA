<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#5746eb">
    <title>Offline - EdoBest</title>
    <style>
        :root {
            --primary: #5746eb;
            --primary-dark: #3d2fc4;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            padding: 1.5rem;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(8px);
        }
        h1 {
            margin: 0 0 0.75rem;
            font-size: 1.5rem;
        }
        p {
            margin: 0 0 1.5rem;
            opacity: 0.95;
            line-height: 1.5;
        }
        button {
            appearance: none;
            border: none;
            border-radius: 10px;
            padding: 0.85rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary-dark);
            background: #fff;
            cursor: pointer;
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <img src="/logo.png" alt="EdoBest" width="64" height="64" style="border-radius: 14px; margin-bottom: 1rem;">
        <h1>Anda sedang offline</h1>
        <p>Koneksi internet terputus. EdoBest membutuhkan jaringan untuk memuat data terbaru. Periksa koneksi lalu coba lagi.</p>
        <button type="button" onclick="location.reload()">Coba lagi</button>
    </div>
</body>
</html>
